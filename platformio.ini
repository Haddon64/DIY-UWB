; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Initiator unit — sends the serial string inside ranging poll frames
[env:dwm3001cdk_initiator]
platform = nordicnrf52
board = nrf52833_dk
framework = zephyr
build_flags = -DUWB_INITIATOR -DDTC_OVERLAY_FILE=nrf52833_dk.overlay
board_build.zephyr.cmake_extra_args = -DDTC_OVERLAY_FILE=nrf52833_dk.overlay
extra_scripts = pre:extra_script.py
upload_protocol = custom
jlink_serial = 760220786
monitor_port = COM5
monitor_speed = 115200

; Responder unit — receives poll frames, prints payload, computes distance
[env:dwm3001cdk_responder]
platform = nordicnrf52
board = nrf52833_dk
framework = zephyr
build_flags = -DDTC_OVERLAY_FILE=nrf52833_dk.overlay
board_build.zephyr.cmake_extra_args = -DDTC_OVERLAY_FILE=nrf52833_dk.overlay
extra_scripts = pre:extra_script.py
upload_protocol = custom
jlink_serial = 760220781
monitor_port = COM8
monitor_speed = 115200

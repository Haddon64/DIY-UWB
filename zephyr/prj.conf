# ── Core Zephyr subsystems ──────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ── Serial (COBS binary — no text console on UART) ─────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n

# ── Memory ───────────────────────────────────────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192

# ── Math (required by dwt_uwb_driver) ────────────────────────────────────────
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

